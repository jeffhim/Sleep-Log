<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wing Nam Sleep Log</title>
<meta name="theme-color" content="#1a1730">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wing Nam Sleep">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Wing Nam Sleep Log">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
/* ============ PWA ICON GENERATION ============ */
(function generateAppIcon() {
  function drawIcon(size) {
    var c = document.createElement('canvas');
    c.width = size; c.height = size;
    var ctx = c.getContext('2d');
    var s = size / 192;
    var bg = ctx.createLinearGradient(0, 0, size, size);
    bg.addColorStop(0, '#2a2060');
    bg.addColorStop(0.5, '#3a2878');
    bg.addColorStop(1, '#4a2070');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.22);
    ctx.fill();
    var glow = ctx.createRadialGradient(size * 0.35, size * 0.35, 0, size * 0.5, size * 0.5, size * 0.7);
    glow.addColorStop(0, 'rgba(201,160,220,0.15)');
    glow.addColorStop(1, 'rgba(201,160,220,0)');
    ctx.fillStyle = glow;
    ctx.fill();
    var mx = size * 0.46, my = size * 0.42, mr = size * 0.28;
    ctx.beginPath();
    ctx.arc(mx, my, mr, 0, Math.PI * 2);
    var moonGrad = ctx.createLinearGradient(mx - mr, my - mr, mx + mr, my + mr);
    moonGrad.addColorStop(0, '#f2a7c3');
    moonGrad.addColorStop(1, '#f5c28a');
    ctx.fillStyle = moonGrad;
    ctx.fill();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(mx + mr * 0.55, my - mr * 0.25, mr * 0.75, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    function drawStar(cx, cy, r, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.beginPath();
      for (var i = 0; i < 4; i++) {
        var angle = (i * Math.PI) / 2;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle - 0.15) * r * 0.35, cy + Math.sin(angle - 0.15) * r * 0.35);
        ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
        ctx.lineTo(cx + Math.cos(angle + 0.15) * r * 0.35, cy + Math.sin(angle + 0.15) * r * 0.35);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    drawStar(size * 0.72, size * 0.22, 14 * s, '#f5c28a', 0.95);
    drawStar(size * 0.82, size * 0.42, 8 * s, '#f5c28a', 0.7);
    drawStar(size * 0.25, size * 0.18, 6 * s, '#c9a0dc', 0.5);
    drawStar(size * 0.15, size * 0.55, 5 * s, '#f2a7c3', 0.4);
    var dots = [[0.62, 0.15], [0.88, 0.58], [0.18, 0.35], [0.75, 0.65], [0.3, 0.7]];
    dots.forEach(function(d) {
      ctx.beginPath();
      ctx.arc(size * d[0], size * d[1], 1.5 * s, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(240,234,248,0.35)';
      ctx.fill();
    });
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#e0d0f0';
    var cloudY = size * 0.78;
    ctx.beginPath();
    ctx.arc(size * 0.32, cloudY, 16 * s, 0, Math.PI * 2);
    ctx.arc(size * 0.48, cloudY - 6 * s, 20 * s, 0, Math.PI * 2);
    ctx.arc(size * 0.66, cloudY, 16 * s, 0, Math.PI * 2);
    ctx.arc(size * 0.50, cloudY + 4 * s, 22 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.save();
    ctx.font = 'bold ' + (18 * s) + 'px sans-serif';
    ctx.fillStyle = 'rgba(201,160,220,0.6)';
    ctx.fillText('z', size * 0.6, size * 0.62);
    ctx.font = 'bold ' + (13 * s) + 'px sans-serif';
    ctx.fillStyle = 'rgba(201,160,220,0.45)';
    ctx.fillText('z', size * 0.68, size * 0.52);
    ctx.restore();
    return c;
  }
  var icon192 = drawIcon(192);
  var icon512 = drawIcon(512);
  var icon180 = drawIcon(180);
  var appleLink = document.createElement('link');
  appleLink.rel = 'apple-touch-icon';
  appleLink.href = icon180.toDataURL('image/png');
  document.head.appendChild(appleLink);
  var favicon = document.createElement('link');
  favicon.rel = 'icon';
  favicon.type = 'image/png';
  favicon.href = icon192.toDataURL('image/png');
  document.head.appendChild(favicon);
  var manifest = {
    name: 'Wing Nam Sleep Log',
    short_name: 'Sleep Log',
    start_url: '.',
    display: 'standalone',
    background_color: '#1a1730',
    theme_color: '#1a1730',
    icons: [
      { src: icon192.toDataURL('image/png'), sizes: '192x192', type: 'image/png' },
      { src: icon512.toDataURL('image/png'), sizes: '512x512', type: 'image/png' }
    ]
  };
  var manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  var manifestUrl = URL.createObjectURL(manifestBlob);
  var manifestLink = document.createElement('link');
  manifestLink.rel = 'manifest';
  manifestLink.href = manifestUrl;
  document.head.appendChild(manifestLink);
})();
</script>
<style>
@font-face {
  font-family: 'NaikaiFont';
  src: url('https://cdn.jsdelivr.net/gh/max32002/naikaifont@1.0/webfont/NaikaiFont-Regular-Lite.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
:root {
  --bg: #1a1730; --bg2: #231f3e; --card: #2a2550; --card-hover: #332d5e;
  --accent: #c9a0dc; --accent-soft: rgba(201,160,220,0.15);
  --pink: #f2a7c3; --pink-soft: rgba(242,167,195,0.12);
  --warm: #f5c28a; --teal: #a8e6cf; --rose: #f48fb1;
  --text: #f0eaf8; --text2: #b8aed0; --text3: #7b6f9e;
  --border: rgba(255,255,255,0.08); --shadow: 0 4px 20px rgba(0,0,0,0.25);
  --radius: 18px; --radius-sm: 12px;
  --gradient-card: linear-gradient(145deg, rgba(201,160,220,0.06), rgba(242,167,195,0.04));
}
html.light {
  --bg: #faf5ff; --bg2: #f3ecfa; --card: #ffffff; --card-hover: #fdf8ff;
  --accent: #b07cc8; --accent-soft: rgba(176,124,200,0.1);
  --pink: #e88fae; --pink-soft: rgba(232,143,174,0.1);
  --warm: #d4944d; --teal: #5fb88e; --rose: #d44f7a;
  --text: #2d1b4e; --text2: #7a6896; --text3: #a99bbe;
  --border: rgba(100,50,150,0.08); --shadow: 0 4px 20px rgba(100,50,120,0.06);
  --gradient-card: linear-gradient(145deg, rgba(176,124,200,0.04), rgba(232,143,174,0.03));
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; height: 100%; }
body {
  font-family: 'NaikaiFont', 'Quicksand', sans-serif; background: var(--bg); color: var(--text);
  height: 100%; height: 100dvh; overflow: hidden;
  display: flex; flex-direction: column;
}
body::before {
  content: ''; position: fixed; top: -40%; left: -20%; width: 80%; height: 80%;
  background: radial-gradient(ellipse, rgba(201,160,220,0.08) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: ''; position: fixed; bottom: -30%; right: -20%; width: 70%; height: 70%;
  background: radial-gradient(ellipse, rgba(242,167,195,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
h1, h2, h3 { font-family: 'NaikaiFont', 'Playfair Display', serif; font-weight: 600; }

/* Header */
.app-header {
  background: linear-gradient(135deg, var(--bg2), var(--card));
  padding: 18px 20px 14px; padding-top: max(18px, env(safe-area-inset-top));
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 50; flex-shrink: 0;
}
.header-icon { font-size: 22px; display: flex; align-items: center; gap: 4px; }
.header-icon .star { color: var(--warm); font-size: 12px; animation: twinkle 2s ease-in-out infinite; }
.header-icon .moon-icon { color: var(--pink); }
@keyframes twinkle { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.app-header h1 { font-size: 22px; letter-spacing: -0.3px; font-weight: 600; }
.app-header h1 .name { color: var(--pink); font-style: italic; }
.sync-btn {
  margin-left: auto; display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer; padding: 6px 10px;
  border-radius: 20px; transition: background 0.2s; color: var(--text2); flex-shrink: 0;
}
.sync-btn:active { background: var(--accent-soft); }
.sync-btn i { font-size: 13px; transition: transform 0.3s; }
.sync-btn.syncing i { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text3); transition: background 0.3s; flex-shrink: 0;
}
.sync-dot.connected { background: var(--teal); box-shadow: 0 0 6px rgba(168,230,207,0.4); }
.sync-dot.syncing { background: var(--warm); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--rose); box-shadow: 0 0 6px rgba(244,143,177,0.4); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.sync-bar {
  flex-shrink: 0; padding: 4px 20px; font-size: 11px; font-weight: 600;
  color: var(--text3); background: var(--bg2); border-bottom: 1px solid var(--border);
  text-align: center; transition: all 0.3s; letter-spacing: 0.3px;
}
.sync-bar.success { color: var(--teal); }
.sync-bar.error { color: var(--rose); }
.sync-bar.saving { color: var(--warm); }

/* Bottom Nav */
.bottom-nav {
  flex-shrink: 0; z-index: 50;
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; padding: 6px 0 max(6px, env(safe-area-inset-bottom));
}
.bottom-nav button {
  flex: 1; background: none; border: none; color: var(--text3);
  font-family: 'NaikaiFont', 'Quicksand', sans-serif; font-size: 11px; font-weight: 600;
  padding: 8px 4px 4px; display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; transition: color 0.25s;
}
.bottom-nav button i { font-size: 19px; }
.bottom-nav button.active { color: var(--pink); }

/* Scrollable content area */
.content-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; position: relative; z-index: 1;
}

/* Panels */
.panel { display: none; padding: 18px; animation: fadeUp 0.35s ease; }
.panel.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Cards */
.card {
  background: var(--card); background-image: var(--gradient-card);
  border-radius: var(--radius); padding: 20px;
  border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 16px;
}
.card-title {
  font-family: 'NaikaiFont', 'Playfair Display', serif; font-size: 17px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px; font-weight: 600;
}
.card-title i { color: var(--accent); font-size: 15px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 12px; font-weight: 700; color: var(--text2);
  margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.8px;
}
.form-input {
  width: 100%; padding: 12px 14px; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: 'NaikaiFont', 'Quicksand', sans-serif;
  font-size: 16px; transition: border-color 0.25s, box-shadow 0.25s;
}
.form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* Chips */
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 8px 14px; border-radius: 24px; font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--border); background: var(--bg); color: var(--text2);
  cursor: pointer; transition: all 0.25s; user-select: none;
}
.chip:active { transform: scale(0.96); }
.chip.selected { background: var(--pink-soft); border-color: var(--pink); color: var(--pink); }
.chip i { margin-right: 3px; }

/* Other reason input */
#otherReasonWrap { margin-top: 10px; display: none; animation: fadeUp 0.25s ease; }
#otherReasonWrap.visible { display: block; }
#otherReasonWrap input {
  width: 100%; padding: 10px 14px; background: var(--bg); border: 1.5px solid var(--pink);
  border-radius: var(--radius-sm); color: var(--text); font-family: 'NaikaiFont', 'Quicksand', sans-serif;
  font-size: 16px; transition: box-shadow 0.25s;
}
#otherReasonWrap input:focus { outline: none; box-shadow: 0 0 0 3px var(--pink-soft); }
#otherReasonWrap label {
  display: block; font-size: 11px; font-weight: 700; color: var(--pink);
  margin-bottom: 5px; letter-spacing: 0.5px;
}

/* Toggle buttons (Yes/No) */
.toggle-group { display: flex; gap: 10px; }
.toggle-btn {
  flex: 1; padding: 11px 14px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
  border: 1.5px solid var(--border); background: var(--bg); color: var(--text2);
  cursor: pointer; transition: all 0.25s; user-select: none;
  font-family: 'NaikaiFont', 'Quicksand', sans-serif; text-align: center;
}
.toggle-btn:active { transform: scale(0.97); }
.toggle-btn i { margin-right: 4px; }
.toggle-btn.selected-no { background: var(--accent-soft); border-color: var(--teal); color: var(--teal); }
.toggle-btn.selected-yes { background: var(--pink-soft); border-color: var(--warm); color: var(--warm); }

/* Buttons */
.btn {
  width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none;
  font-family: 'NaikaiFont', 'Quicksand', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.25s; letter-spacing: 0.3px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--pink));
  color: #fff; box-shadow: 0 4px 16px rgba(201,160,220,0.25);
}
.btn-primary:active { transform: scale(0.98); opacity: 0.9; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text2); }
.btn-outline:active { background: var(--accent-soft); }
.btn-danger { background: var(--rose); color: #fff; }
.btn-sm { width: auto; padding: 8px 16px; font-size: 13px; }

/* History Entry */
.entry-card {
  background: var(--card); background-image: var(--gradient-card);
  border-radius: var(--radius); padding: 16px;
  border: 1px solid var(--border); margin-bottom: 12px;
  transition: background 0.2s;
}
.entry-card:active { background: var(--card-hover); }
.entry-date {
  font-family: 'NaikaiFont', 'Playfair Display', serif; font-size: 17px; margin-bottom: 8px;
  color: var(--pink);
}
.entry-metrics { display: flex; flex-wrap: wrap; gap: 10px; font-size: 13px; color: var(--text2); }
.entry-metrics span { display: flex; align-items: center; gap: 4px; }
.entry-metrics i { font-size: 11px; color: var(--accent); }
.entry-causes { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.entry-cause-tag {
  font-size: 11px; padding: 3px 10px; border-radius: 12px;
  background: var(--pink-soft); color: var(--pink); font-weight: 700;
}

/* Filter bar */
.filter-bar {
  display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;
  -webkit-overflow-scrolling: touch; padding-bottom: 2px;
}
.filter-btn {
  padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700;
  border: 1.5px solid var(--border); background: var(--bg); color: var(--text2);
  cursor: pointer; transition: all 0.25s; white-space: nowrap; flex-shrink: 0;
  font-family: 'NaikaiFont', 'Quicksand', sans-serif;
}
.filter-btn:active { transform: scale(0.96); }
.filter-btn.active { background: var(--pink-soft); border-color: var(--pink); color: var(--pink); }
.custom-range {
  display: none; gap: 10px; align-items: center; margin-bottom: 16px;
}
.custom-range.visible { display: flex; }
.custom-range input { flex: 1; padding: 10px 12px; font-size: 14px; }
.custom-range span { color: var(--text3); font-size: 13px; font-weight: 600; }

/* Metric Cards */
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.metric-card {
  background: var(--card); background-image: var(--gradient-card);
  border-radius: var(--radius); padding: 16px;
  border: 1px solid var(--border); text-align: center;
}
.metric-value { font-family: 'NaikaiFont', 'Playfair Display', serif; font-size: 30px; font-weight: 600; }
.metric-label { font-size: 11px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
.metric-card.good .metric-value { color: var(--teal); }
.metric-card.warn .metric-value { color: var(--warm); }
.metric-card.bad .metric-value { color: var(--rose); }

/* Chart */
.chart-wrap { position: relative; height: 220px; margin: 10px 0; }

/* Observations */
.observation {
  padding: 12px 16px; background: var(--bg); border-radius: var(--radius-sm);
  margin-bottom: 10px; border-left: 3px solid var(--accent); font-size: 13px; line-height: 1.6;
}
.observation i { margin-right: 6px; }
.observation.good { border-left-color: var(--teal); }
.observation.warn { border-left-color: var(--warm); }
.observation.bad { border-left-color: var(--rose); }

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--card); color: var(--text); padding: 12px 24px;
  border-radius: 24px; font-size: 14px; font-weight: 600; z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid var(--border);
  animation: toastIn 0.3s ease;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(16px); } }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(10,8,20,0.6); z-index: 300;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.2s ease;
}
html.light .modal-overlay { background: rgba(80,50,100,0.25); }
@keyframes fadeIn { from { opacity: 0; } }
.modal-content {
  background: var(--card); width: 100%; max-width: 480px; border-radius: 22px 22px 0 0;
  padding: 24px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease;
  border: 1px solid var(--border);
}
@keyframes slideUp { from { transform: translateY(100%); } }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.modal-header h2 { font-size: 20px; }
.modal-close {
  background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer;
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: color 0.2s;
}

/* Awakening times */
#awakeningTimesWrap { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.awakening-row { display: flex; align-items: center; gap: 8px; }
.awakening-row input { flex: 1; }
.awakening-row span { font-size: 12px; color: var(--text3); white-space: nowrap; min-width: 22px; font-weight: 600; }

/* Empty state */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-state i { font-size: 44px; margin-bottom: 16px; display: block; color: var(--accent); opacity: 0.35; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 4px; }


/* Install banner */
.install-banner {
  position: fixed; bottom: 70px; left: 12px; right: 12px; z-index: 200;
  animation: slideUp 0.35s ease;
}
.install-banner-inner {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  display: flex; flex-direction: column; gap: 12px;
}
.install-banner-text { display: flex; align-items: center; gap: 12px; }
.install-banner-text b { color: var(--text); font-size: 14px; }
.install-banner-btns { display: flex; gap: 8px; }
.install-banner-btns .btn { flex: 1; }

/* Decorative stars scattered */
.deco-stars {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.deco-stars span {
  position: absolute; color: var(--warm); opacity: 0.15; font-size: 8px;
  animation: twinkle 3s ease-in-out infinite;
}
html.light .deco-stars span { opacity: 0.12; color: var(--accent); }
</style>
</head>
<body>

<!-- Decorative background stars -->
<div class="deco-stars" id="decoStars"></div>

<header class="app-header">
  <div class="header-icon">
    <i class="fa-solid fa-star star"></i>
    <i class="fa-solid fa-cloud-moon moon-icon" style="font-size:24px;"></i>
  </div>
  <h1><span class="name">Wing Nam</span> Sleep Log</h1>
  <button class="sync-btn" id="syncBtn" onclick="fetchEntries()" title="Tap to sync">
    <div class="sync-dot" id="syncDot"></div>
    <i class="fa-solid fa-arrows-rotate" id="syncIcon"></i>
  </button>
</header>
<div class="sync-bar" id="syncBar">
  <span id="syncText">Connecting...</span>
</div>

<div class="content-area" id="contentArea">
<!-- LOG PANEL -->
<div class="panel active" id="panelLog">
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-bed"></i> Log Sleep</div>
    <form id="sleepForm" autocomplete="off" novalidate>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="fDate">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Bed Time</label>
          <input type="time" class="form-input" id="fBedTime">
        </div>
        <div class="form-group">
          <label class="form-label">Melatonin Time</label>
          <input type="time" class="form-input" id="fMelatonin">
          <div class="form-hint">Leave empty if not taken</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Fall Asleep Time</label>
          <input type="time" class="form-input" id="fFallAsleep">
        </div>
        <div class="form-group">
          <label class="form-label">Wake Up Time</label>
          <input type="time" class="form-input" id="fWakeUp">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Awakenings During Night</label>
        <input type="number" class="form-input" id="fAwakeCount" min="0" max="20" value="0">
        <div id="awakeningTimesWrap"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Cause of Awakening</label>
        <div class="chip-group" id="causeChips">
          <div class="chip" data-val="noise"><i class="fa-solid fa-volume-high"></i> Noise</div>
          <div class="chip" data-val="light"><i class="fa-solid fa-sun"></i> Light</div>
          <div class="chip" data-val="stress"><i class="fa-solid fa-brain"></i> Stress</div>
          <div class="chip" data-val="bathroom"><i class="fa-solid fa-restroom"></i> Bathroom</div>
          <div class="chip" data-val="pain"><i class="fa-solid fa-heart-pulse"></i> Pain</div>
          <div class="chip" data-val="unsure"><i class="fa-solid fa-question"></i> Not Sure</div>
          <div class="chip" data-val="other" id="chipOther"><i class="fa-solid fa-ellipsis"></i> Other</div>
        </div>
        <div id="otherReasonWrap">
          <label>What woke you up?</label>
          <input type="text" id="fOtherReason" placeholder="e.g. bad dream, too hot..." class="form-input">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fa-solid fa-weight-scale" style="margin-right:4px;"></i> Wake Up Weight (after toilet)</label>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="number" class="form-input" id="fWeight" step="0.1" min="20" max="200" placeholder="e.g. 52.3" style="flex:1;">
          <span style="color:var(--text2);font-weight:700;font-size:14px;">kg</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fa-solid fa-wine-glass" style="margin-right:4px;"></i> Alcohol Today?</label>
        <div class="toggle-group" id="alcoholToggle">
          <button type="button" class="toggle-btn selected-no" data-val="no"><i class="fa-solid fa-xmark"></i> No</button>
          <button type="button" class="toggle-btn" data-val="yes"><i class="fa-solid fa-wine-glass"></i> Yes</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="fNotes" rows="2" placeholder="Anything notable..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary" id="saveBtn">
        <i class="fa-solid fa-check"></i> Save Entry
      </button>
    </form>
  </div>
</div>

<!-- HISTORY PANEL -->
<div class="panel" id="panelHistory">
  <div id="historyList"></div>
</div>

<!-- INSIGHTS PANEL -->
<div class="panel" id="panelInsights">
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-range="all">All</button>
    <button class="filter-btn" data-range="month">This Month</button>
    <button class="filter-btn" data-range="week">This Week</button>
    <button class="filter-btn" data-range="custom">Custom</button>
  </div>
  <div class="custom-range" id="customRange">
    <input type="date" class="form-input" id="filterFrom">
    <span>to</span>
    <input type="date" class="form-input" id="filterTo">
  </div>
  <div id="filteredCount" style="font-size:11px;color:var(--text3);margin-bottom:12px;text-align:center;font-weight:600;"></div>
  <div class="metrics-grid" id="metricsGrid"></div>
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-chart-line"></i> Sleep Duration</div>
    <div class="chart-wrap"><canvas id="chartDuration"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-clock"></i> Bed & Wake Times</div>
    <div class="chart-wrap"><canvas id="chartTimes"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-weight-scale"></i> Body Weight Trend</div>
    <div class="chart-wrap" style="height:260px;"><canvas id="chartWeight"></canvas></div>
    <div style="font-size:11px;color:var(--text3);margin-top:6px;text-align:center;">Shaded area = healthy BMI range (18.5–22.9) for 163cm</div>
  </div>
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-chart-pie"></i> Awakening Causes</div>
    <div class="chart-wrap"><canvas id="chartCauses"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-lightbulb"></i> Pattern Observations</div>
    <div id="observations"></div>
  </div>
</div>

</div><!-- end content-area -->

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="active" data-tab="panelLog"><i class="fa-solid fa-cloud-moon"></i>Log</button>
  <button data-tab="panelHistory"><i class="fa-solid fa-list"></i>History</button>
  <button data-tab="panelInsights"><i class="fa-solid fa-chart-column"></i>Insights</button>
</nav>

<!-- MODAL CONTAINER -->
<div id="modalContainer"></div>

<script>
/* ============ STATE ============ */
var entries = [];
var sheetUrl = 'https://script.google.com/macros/s/AKfycbwk20F4cceVLVg1ad8CHxW2NSbGnwufGPn2Mv7NuxFDwY6i2PLv5b2R2BG_4EEHVKMfIg/exec';
var editId = null;
var syncInterval = null;
var charts = {};
var insightFilter = 'all';
var customStart = '';
var customEnd = '';

/* ============ PWA INSTALL ============ */
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('installBanner')) return;
  var banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.className = 'install-banner';
  banner.innerHTML =
    '<div class="install-banner-inner">' +
      '<div class="install-banner-text">' +
        '<i class="fa-solid fa-cloud-moon" style="color:var(--pink);font-size:20px;"></i>' +
        '<div><b>安裝 Sleep Log App</b><br><span style="font-size:11px;color:var(--text2);">加到主畫面，像 App 一樣使用</span></div>' +
      '</div>' +
      '<div class="install-banner-btns">' +
        '<button class="btn btn-primary btn-sm" id="installAcceptBtn"><i class="fa-solid fa-download"></i> 安裝</button>' +
        '<button class="btn btn-outline btn-sm" id="installDismissBtn">之後</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(banner);
  document.getElementById('installAcceptBtn').addEventListener('click', function() {
    banner.remove();
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function() { deferredPrompt = null; });
    }
  });
  document.getElementById('installDismissBtn').addEventListener('click', function() { banner.remove(); });
}

/* Register Service Worker */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}

/* ============ INIT ============ */
(function init() {
  detectTheme();
  generateStars();
  setupNav();
  setupForm();
  setupFilters();
  setDefaultDate();
  setSyncStatus('syncing', 'Connecting...');
  fetchEntries();
  startAutoSync();
})();

function detectTheme() {
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    document.documentElement.classList.add('light');
  }
  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e) {
    document.documentElement.classList.toggle('light', e.matches);
    if (Object.keys(charts).length) renderInsights();
  });
}

function generateStars() {
  var container = document.getElementById('decoStars');
  var html = '';
  for (var i = 0; i < 20; i++) {
    var x = Math.random() * 100;
    var y = Math.random() * 100;
    var delay = (Math.random() * 4).toFixed(1);
    var size = (6 + Math.random() * 6).toFixed(0);
    html += '<span style="left:' + x + '%;top:' + y + '%;font-size:' + size + 'px;animation-delay:' + delay + 's;">&#10022;</span>';
  }
  container.innerHTML = html;
}

function setDefaultDate() {
  var d = new Date();
  document.getElementById('fDate').value = d.toISOString().split('T')[0];
}

/* ============ NAVIGATION ============ */
function setupNav() {
  document.querySelectorAll('.bottom-nav button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.bottom-nav button').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'panelLog') resetForm();
      if (btn.dataset.tab === 'panelInsights') renderInsights();
      if (btn.dataset.tab === 'panelHistory') renderHistory();
    });
  });
}

/* ============ FILTERS ============ */
function setupFilters() {
  document.querySelectorAll('#filterBar .filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#filterBar .filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      insightFilter = btn.dataset.range;
      var customWrap = document.getElementById('customRange');
      if (insightFilter === 'custom') {
        customWrap.classList.add('visible');
      } else {
        customWrap.classList.remove('visible');
      }
      renderInsights();
    });
  });
  document.getElementById('filterFrom').addEventListener('change', function() {
    customStart = this.value;
    if (insightFilter === 'custom') renderInsights();
  });
  document.getElementById('filterTo').addEventListener('change', function() {
    customEnd = this.value;
    if (insightFilter === 'custom') renderInsights();
  });
}

function getFilteredEntries() {
  if (insightFilter === 'all') return entries.slice();
  var now = new Date();
  var startDate, endDate;
  if (insightFilter === 'month') {
    startDate = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    endDate = now.toISOString().split('T')[0];
  } else if (insightFilter === 'week') {
    var day = now.getDay();
    var diff = now.getDate() - day + (day === 0 ? -6 : 1);
    startDate = new Date(now.getFullYear(), now.getMonth(), diff).toISOString().split('T')[0];
    endDate = now.toISOString().split('T')[0];
  } else if (insightFilter === 'custom') {
    startDate = customStart || '2000-01-01';
    endDate = customEnd || '2099-12-31';
  }
  return entries.filter(function(e) {
    return e.date >= startDate && e.date <= endDate;
  });
}

/* ============ FORM ============ */
function setupForm() {
  document.getElementById('fAwakeCount').addEventListener('input', renderAwakeningInputs);

  document.querySelectorAll('#causeChips .chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      chip.classList.toggle('selected');
      if (chip.id === 'chipOther') {
        var wrap = document.getElementById('otherReasonWrap');
        if (chip.classList.contains('selected')) {
          wrap.classList.add('visible');
          document.getElementById('fOtherReason').focus();
        } else {
          wrap.classList.remove('visible');
          document.getElementById('fOtherReason').value = '';
        }
      }
    });
  });

  /* Alcohol toggle */
  document.querySelectorAll('#alcoholToggle .toggle-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('#alcoholToggle .toggle-btn').forEach(function(b) {
        b.classList.remove('selected-yes', 'selected-no');
      });
      btn.classList.add(btn.dataset.val === 'yes' ? 'selected-yes' : 'selected-no');
    });
  });

  document.getElementById('sleepForm').addEventListener('submit', function(e) {
    e.preventDefault();
    saveEntry();
  });
}

function renderAwakeningInputs() {
  var count = parseInt(document.getElementById('fAwakeCount').value) || 0;
  var wrap = document.getElementById('awakeningTimesWrap');
  var existing = wrap.querySelectorAll('input[type="time"]');
  var vals = [];
  existing.forEach(function(inp) { vals.push(inp.value); });
  wrap.innerHTML = '';
  for (var i = 0; i < count; i++) {
    var row = document.createElement('div');
    row.className = 'awakening-row';
    row.innerHTML = '<span>#' + (i + 1) + '</span><input type="time" class="form-input" value="' + (vals[i] || '') + '">';
    wrap.appendChild(row);
  }
}

function getFormData() {
  var causes = [];
  document.querySelectorAll('#causeChips .chip.selected').forEach(function(c) {
    if (c.id === 'chipOther') {
      var reason = document.getElementById('fOtherReason').value.trim();
      causes.push(reason ? 'other:' + reason : 'other');
    } else {
      causes.push(c.dataset.val);
    }
  });
  var awakeTimes = [];
  document.querySelectorAll('#awakeningTimesWrap input').forEach(function(inp) {
    if (inp.value) awakeTimes.push(inp.value);
  });
  var alcoholYes = document.querySelector('#alcoholToggle .toggle-btn.selected-yes');
  var alcoholNo = document.querySelector('#alcoholToggle .toggle-btn.selected-no');
  var alcoholVal = alcoholYes ? 'yes' : (alcoholNo ? 'no' : '');
  return {
    id: editId || generateId(),
    date: document.getElementById('fDate').value,
    bedTime: document.getElementById('fBedTime').value,
    melatoninTime: document.getElementById('fMelatonin').value,
    fallAsleepTime: document.getElementById('fFallAsleep').value,
    awakeCount: parseInt(document.getElementById('fAwakeCount').value) || 0,
    awakeningTimes: awakeTimes.join(','),
    wakeUpTime: document.getElementById('fWakeUp').value,
    causes: causes.join(','),
    notes: document.getElementById('fNotes').value,
    alcohol: alcoholVal,
    weight: document.getElementById('fWeight').value
  };
}

function populateForm(entry) {
  editId = entry.id;
  document.getElementById('fDate').value = entry.date;
  document.getElementById('fBedTime').value = entry.bedTime;
  document.getElementById('fMelatonin').value = entry.melatoninTime || '';
  document.getElementById('fFallAsleep').value = entry.fallAsleepTime;
  document.getElementById('fWakeUp').value = entry.wakeUpTime;
  document.getElementById('fAwakeCount').value = entry.awakeCount || 0;
  document.getElementById('fNotes').value = entry.notes || '';
  document.getElementById('fWeight').value = entry.weight || '';

  /* Reset chips */
  document.querySelectorAll('#causeChips .chip').forEach(function(c) { c.classList.remove('selected'); });
  document.getElementById('otherReasonWrap').classList.remove('visible');
  document.getElementById('fOtherReason').value = '';

  var causesArr = (entry.causes || '').split(',');
  causesArr.forEach(function(cause) {
    if (!cause) return;
    if (cause.indexOf('other') === 0) {
      document.getElementById('chipOther').classList.add('selected');
      document.getElementById('otherReasonWrap').classList.add('visible');
      var colonIdx = cause.indexOf(':');
      if (colonIdx !== -1) {
        document.getElementById('fOtherReason').value = cause.slice(colonIdx + 1);
      }
    } else {
      var chip = document.querySelector('#causeChips .chip[data-val="' + cause + '"]');
      if (chip) chip.classList.add('selected');
    }
  });

  /* Alcohol */
  document.querySelectorAll('#alcoholToggle .toggle-btn').forEach(function(b) {
    b.classList.remove('selected-yes', 'selected-no');
  });
  if (entry.alcohol === 'yes') {
    document.querySelector('#alcoholToggle .toggle-btn[data-val="yes"]').classList.add('selected-yes');
  } else {
    document.querySelector('#alcoholToggle .toggle-btn[data-val="no"]').classList.add('selected-no');
  }

  renderAwakeningInputs();
  var times = (entry.awakeningTimes || '').split(',');
  document.querySelectorAll('#awakeningTimesWrap input').forEach(function(inp, i) {
    inp.value = times[i] || '';
  });
  document.getElementById('saveBtn').innerHTML = '<i class="fa-solid fa-pen"></i> Update Entry';
  switchTab('panelLog');
}

function resetForm() {
  editId = null;
  document.getElementById('sleepForm').reset();
  setDefaultDate();
  document.querySelectorAll('#causeChips .chip').forEach(function(c) { c.classList.remove('selected'); });
  document.getElementById('awakeningTimesWrap').innerHTML = '';
  document.getElementById('otherReasonWrap').classList.remove('visible');
  document.getElementById('fOtherReason').value = '';
  document.getElementById('fWeight').value = '';
  /* Reset alcohol - no default */
  document.querySelectorAll('#alcoholToggle .toggle-btn').forEach(function(b) {
    b.classList.remove('selected-yes', 'selected-no');
  });
  document.getElementById('saveBtn').innerHTML = '<i class="fa-solid fa-check"></i> Save Entry';
}

/* ============ SAVE / EDIT / DELETE ============ */
function saveEntry() {
  var data = getFormData();
  if (!data.date) { data.date = new Date().toISOString().split('T')[0]; }
  if (editId) {
    var idx = entries.findIndex(function(e) { return e.id === editId; });
    if (idx !== -1) entries[idx] = data;
    if (sheetUrl) postToSheet('update', data);
  } else {
    var existIdx = entries.findIndex(function(e) { return e.date === data.date; });
    if (existIdx !== -1) {
      data.id = entries[existIdx].id;
      entries[existIdx] = data;
      if (sheetUrl) postToSheet('update', data);
    } else {
      entries.push(data);
      if (sheetUrl) postToSheet('add', data);
    }
  }
  entries.sort(function(a, b) { return b.date.localeCompare(a.date); });
  var wasEdit = !!editId;
  showToast(wasEdit ? 'Entry updated!' : 'Entry saved!');
  resetForm();
  if (wasEdit) {
    renderHistory();
    switchTab('panelHistory');
  }
}

function deleteEntry(id) {
  showModal('Delete Entry', 'Are you sure you want to delete this entry?', function() {
    entries = entries.filter(function(e) { return e.id !== id; });
    if (sheetUrl) postToSheet('delete', { id: id });
    renderHistory();
    showToast('Entry deleted');
  });
}

/* ============ HISTORY ============ */
function formatCauseLabel(c) {
  if (!c) return '';
  if (c.indexOf('other:') === 0) return c.slice(6);
  return c.charAt(0).toUpperCase() + c.slice(1);
}

function renderHistory() {
  var wrap = document.getElementById('historyList');
  if (entries.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><i class="fa-solid fa-cloud-moon"></i><p>No sleep entries yet.<br>Start logging on the Log tab!</p></div>';
    return;
  }
  var html = '';
  entries.forEach(function(e) {
    var dur = calcDuration(e.fallAsleepTime, e.wakeUpTime);
    var latency = calcMinutes(e.bedTime, e.fallAsleepTime);
    var causeTags = '';
    if (e.causes) {
      e.causes.split(',').forEach(function(c) {
        if (c) causeTags += '<span class="entry-cause-tag">' + escHtml(formatCauseLabel(c)) + '</span>';
      });
    }
    var alcoholTag = e.alcohol === 'yes' ? '<span class="entry-cause-tag" style="background:rgba(245,194,138,0.15);color:var(--warm);"><i class="fa-solid fa-wine-glass" style="margin-right:3px;font-size:10px;"></i>Alcohol</span>' : '';
    html += '<div class="entry-card" data-id="' + e.id + '">' +
      '<div class="entry-date">' + formatDate(e.date) + '</div>' +
      '<div class="entry-metrics">' +
        (dur.h || dur.m ? '<span><i class="fa-solid fa-clock"></i> ' + dur.h + 'h ' + dur.m + 'm</span>' : '') +
        (e.bedTime ? '<span><i class="fa-solid fa-bed"></i> ' + fmtTime(e.bedTime) + '</span>' : '') +
        (e.fallAsleepTime ? '<span><i class="fa-solid fa-moon"></i> ' + fmtTime(e.fallAsleepTime) + '</span>' : '') +
        (e.wakeUpTime ? '<span><i class="fa-solid fa-sun"></i> ' + fmtTime(e.wakeUpTime) + '</span>' : '') +
        '<span><i class="fa-solid fa-bell"></i> ' + (e.awakeCount || 0) + ' wake-ups</span>' +
        (e.melatoninTime ? '<span><i class="fa-solid fa-pills"></i> ' + fmtTime(e.melatoninTime) + '</span>' : '') +
        (latency > 0 ? '<span><i class="fa-solid fa-hourglass-half"></i> ' + latency + 'm to sleep</span>' : '') +
        (e.weight ? '<span><i class="fa-solid fa-weight-scale"></i> ' + e.weight + ' kg</span>' : '') +
      '</div>' +
      (causeTags || alcoholTag ? '<div class="entry-causes">' + causeTags + alcoholTag + '</div>' : '') +
      (e.notes ? '<div style="font-size:12px;color:var(--text3);margin-top:6px;"><i class="fa-solid fa-note-sticky"></i> ' + escHtml(e.notes) + '</div>' : '') +
      '<div style="display:flex;gap:8px;margin-top:12px;">' +
        '<button class="btn btn-outline btn-sm" onclick="populateForm(entries.find(function(x){return x.id===\'' + e.id + '\'}))"><i class="fa-solid fa-pen"></i> Edit</button>' +
        '<button class="btn btn-outline btn-sm" style="color:var(--rose);border-color:var(--rose);" onclick="deleteEntry(\'' + e.id + '\')"><i class="fa-solid fa-trash"></i></button>' +
      '</div>' +
    '</div>';
  });
  wrap.innerHTML = html;
}

/* ============ INSIGHTS ============ */
function renderInsights() {
  var filtered = getFilteredEntries();
  var countEl = document.getElementById('filteredCount');
  if (insightFilter !== 'all') {
    countEl.textContent = 'Showing ' + filtered.length + ' of ' + entries.length + ' entries';
  } else {
    countEl.textContent = '';
  }
  if (filtered.length < 2) {
    document.getElementById('metricsGrid').innerHTML = '';
    document.getElementById('observations').innerHTML = '<div class="empty-state"><i class="fa-solid fa-chart-column"></i><p>Need at least 2 entries in this range<br>to show insights and patterns.</p></div>';
    return;
  }
  renderMetricCards(filtered);
  renderCharts(filtered);
  renderObservations(filtered);
}

function renderMetricCards(data) {
  var avgDur = 0, avgLat = 0, avgEff = 0, avgAwake = 0, count = data.length;
  data.forEach(function(e) {
    var dur = calcDuration(e.fallAsleepTime, e.wakeUpTime);
    avgDur += dur.h + dur.m / 60;
    avgLat += calcMinutes(e.bedTime, e.fallAsleepTime);
    var timeInBed = calcMinutes(e.bedTime, e.wakeUpTime);
    var sleepMin = dur.h * 60 + dur.m;
    avgEff += timeInBed > 0 ? (sleepMin / timeInBed) * 100 : 0;
    avgAwake += (parseInt(e.awakeCount) || 0);
  });
  avgDur /= count; avgLat /= count; avgEff /= count; avgAwake /= count;

  var durClass = avgDur >= 7 ? 'good' : avgDur >= 6 ? 'warn' : 'bad';
  var latClass = avgLat <= 20 ? 'good' : avgLat <= 40 ? 'warn' : 'bad';
  var effClass = avgEff >= 85 ? 'good' : avgEff >= 70 ? 'warn' : 'bad';
  var awakeClass = avgAwake <= 1 ? 'good' : avgAwake <= 3 ? 'warn' : 'bad';

  /* Latest weight and BMI */
  var weightCards = '';
  var latestWeight = data.slice().sort(function(a, b) { return b.date.localeCompare(a.date); })
    .find(function(e) { return e.weight && parseFloat(e.weight) > 0; });
  if (latestWeight) {
    var w = parseFloat(latestWeight.weight);
    var bmi = w / (1.63 * 1.63);
    var bmiClass = bmi >= 18.5 && bmi <= 22.9 ? 'good' : bmi < 18.5 ? 'warn' : 'bad';
    weightCards = metricHtml('Weight', w.toFixed(1) + 'kg', bmiClass) +
                  metricHtml('BMI', bmi.toFixed(1), bmiClass);
  }

  document.getElementById('metricsGrid').innerHTML =
    metricHtml('Sleep', avgDur.toFixed(1) + 'h', durClass) +
    metricHtml('Latency', Math.round(avgLat) + 'min', latClass) +
    metricHtml('Efficiency', Math.round(avgEff) + '%', effClass) +
    metricHtml('Awakenings', avgAwake.toFixed(1), awakeClass) +
    weightCards;
}

function metricHtml(label, value, cls) {
  return '<div class="metric-card ' + cls + '"><div class="metric-value">' + value + '</div><div class="metric-label">' + label + '</div></div>';
}

function renderLineChart(canvasId, labels, datasets, gridColor, textColor, tickCb) {

function renderObservations(data) {
  var obs = [];
  var avgLat = 0, avgDur = 0, avgAwake = 0;
  var melatoninDays = [], noMelatoninDays = [];
  var alcoholDays = [], noAlcoholDays = [];
  var melTimingData = [];
  var causeCount = {};
  var bedTimes = [];

  data.forEach(function(e) {
    var lat = calcMinutes(e.bedTime, e.fallAsleepTime);
    var dur = calcDuration(e.fallAsleepTime, e.wakeUpTime);
    var durH = dur.h + dur.m / 60;
    var awakeN = parseInt(e.awakeCount) || 0;
    avgLat += lat; avgDur += durH;
    avgAwake += awakeN;
    bedTimes.push(timeToDecimal(e.bedTime));

    if (e.melatoninTime) {
      melatoninDays.push({ lat: lat, dur: durH, awake: awakeN });
      var melToBed = calcMinutes(e.melatoninTime, e.bedTime);
      melTimingData.push({ gap: melToBed, lat: lat, awake: awakeN, dur: durH });
    } else {
      noMelatoninDays.push({ lat: lat, dur: durH, awake: awakeN });
    }

    if (e.alcohol === 'yes') {
      alcoholDays.push({ lat: lat, dur: durH, awake: awakeN });
    } else {
      noAlcoholDays.push({ lat: lat, dur: durH, awake: awakeN });
    }

    if (e.causes) e.causes.split(',').forEach(function(c) {
      if (c) {
        var label = formatCauseLabel(c);
        causeCount[label] = (causeCount[label] || 0) + 1;
      }
    });
  });
  var n = data.length;
  avgLat /= n; avgDur /= n; avgAwake /= n;

  /* Sleep latency */
  if (avgLat > 30) {
    obs.push({ cls: 'bad', icon: 'fa-hourglass-half', text: 'Average sleep latency is <b>' + Math.round(avgLat) + ' min</b> (>30 min is an insomnia indicator). Try a consistent wind-down routine.' });
  } else if (avgLat > 15) {
    obs.push({ cls: 'warn', icon: 'fa-hourglass-half', text: 'Average sleep latency is <b>' + Math.round(avgLat) + ' min</b>. Fairly normal, but could improve with relaxation techniques.' });
  } else {
    obs.push({ cls: 'good', icon: 'fa-hourglass-half', text: 'Average sleep latency is <b>' + Math.round(avgLat) + ' min</b>. You fall asleep quickly \u2014 great sign!' });
  }

  /* Sleep duration */
  if (avgDur < 6) {
    obs.push({ cls: 'bad', icon: 'fa-clock', text: 'Average sleep is only <b>' + avgDur.toFixed(1) + ' hours</b>. Adults need 7\u20139 hours for optimal health.' });
  } else if (avgDur < 7) {
    obs.push({ cls: 'warn', icon: 'fa-clock', text: 'Average sleep is <b>' + avgDur.toFixed(1) + ' hours</b>. Slightly under the recommended 7\u20139 hours.' });
  } else {
    obs.push({ cls: 'good', icon: 'fa-clock', text: 'Average sleep is <b>' + avgDur.toFixed(1) + ' hours</b>. Within the healthy 7\u20139 hour range!' });
  }

  /* Bedtime consistency */
  var bedStd = stdDev(bedTimes);
  if (bedStd > 1.5) {
    obs.push({ cls: 'bad', icon: 'fa-bed', text: 'Bedtime varies a lot (\u00b1' + bedStd.toFixed(1) + ' hrs). Irregular schedules worsen insomnia.' });
  } else if (bedStd > 0.75) {
    obs.push({ cls: 'warn', icon: 'fa-bed', text: 'Bedtime has moderate variation (\u00b1' + bedStd.toFixed(1) + ' hrs). More consistency may help.' });
  } else {
    obs.push({ cls: 'good', icon: 'fa-bed', text: 'Bedtime is very consistent (\u00b1' + bedStd.toFixed(1) + ' hrs). Great sleep hygiene!' });
  }

  /* Melatonin effectiveness */
  if (melatoninDays.length >= 2 && noMelatoninDays.length >= 2) {
    var melAvgLat = melatoninDays.reduce(function(s, d) { return s + d.lat; }, 0) / melatoninDays.length;
    var noMelAvgLat = noMelatoninDays.reduce(function(s, d) { return s + d.lat; }, 0) / noMelatoninDays.length;
    var diff = noMelAvgLat - melAvgLat;
    if (diff > 5) {
      obs.push({ cls: 'good', icon: 'fa-pills', text: 'Melatonin appears effective: latency is <b>' + Math.round(diff) + ' min less</b> on melatonin nights (' + Math.round(melAvgLat) + ' vs ' + Math.round(noMelAvgLat) + ' min).' });
    } else {
      obs.push({ cls: 'warn', icon: 'fa-pills', text: 'Melatonin shows little effect on sleep latency (' + Math.round(melAvgLat) + ' vs ' + Math.round(noMelAvgLat) + ' min). Consider timing or dosage adjustments.' });
    }
  }

  /* Melatonin timing vs bed time analysis */
  if (melTimingData.length >= 3) {
    var avgGap = melTimingData.reduce(function(s, d) { return s + d.gap; }, 0) / melTimingData.length;
    var earlyMel = melTimingData.filter(function(d) { return d.gap >= 30; });
    var lateMel = melTimingData.filter(function(d) { return d.gap < 30; });

    if (earlyMel.length >= 2 && lateMel.length >= 2) {
      var earlyAvgLat = earlyMel.reduce(function(s, d) { return s + d.lat; }, 0) / earlyMel.length;
      var lateAvgLat = lateMel.reduce(function(s, d) { return s + d.lat; }, 0) / lateMel.length;
      var earlyAvgAwake = earlyMel.reduce(function(s, d) { return s + d.awake; }, 0) / earlyMel.length;
      var lateAvgAwake = lateMel.reduce(function(s, d) { return s + d.awake; }, 0) / lateMel.length;

      if (earlyAvgLat < lateAvgLat - 5 || earlyAvgAwake < lateAvgAwake - 0.5) {
        obs.push({ cls: 'good', icon: 'fa-clock-rotate-left', text: 'Taking melatonin <b>30+ min before bed</b> works better for you: latency ' + Math.round(earlyAvgLat) + ' vs ' + Math.round(lateAvgLat) + ' min, awakenings ' + earlyAvgAwake.toFixed(1) + ' vs ' + lateAvgAwake.toFixed(1) + '.' });
      } else if (lateAvgLat < earlyAvgLat - 5) {
        obs.push({ cls: 'warn', icon: 'fa-clock-rotate-left', text: 'Interestingly, taking melatonin <b>closer to bedtime</b> (&lt;30 min) seems to work better: latency ' + Math.round(lateAvgLat) + ' vs ' + Math.round(earlyAvgLat) + ' min.' });
      } else {
        obs.push({ cls: 'warn', icon: 'fa-clock-rotate-left', text: 'Melatonin timing (avg ' + Math.round(avgGap) + ' min before bed) doesn\u2019t show a strong pattern yet. Experts recommend 30\u201360 min before bed.' });
      }
    } else {
      obs.push({ cls: 'warn', icon: 'fa-clock-rotate-left', text: 'Melatonin is taken on avg <b>' + Math.round(avgGap) + ' min</b> before bed. Optimal is 30\u201360 min. Try varying the timing to find what works best.' });
    }
  }

  /* Alcohol impact */
  if (alcoholDays.length >= 2 && noAlcoholDays.length >= 2) {
    var alcAvgAwake = alcoholDays.reduce(function(s, d) { return s + d.awake; }, 0) / alcoholDays.length;
    var noAlcAvgAwake = noAlcoholDays.reduce(function(s, d) { return s + d.awake; }, 0) / noAlcoholDays.length;
    var alcAvgDur = alcoholDays.reduce(function(s, d) { return s + d.dur; }, 0) / alcoholDays.length;
    var noAlcAvgDur = noAlcoholDays.reduce(function(s, d) { return s + d.dur; }, 0) / noAlcoholDays.length;
    var alcAvgLat = alcoholDays.reduce(function(s, d) { return s + d.lat; }, 0) / alcoholDays.length;
    var noAlcAvgLat = noAlcoholDays.reduce(function(s, d) { return s + d.lat; }, 0) / noAlcoholDays.length;

    var awakeImpact = alcAvgAwake - noAlcAvgAwake;
    var durImpact = noAlcAvgDur - alcAvgDur;

    if (awakeImpact > 0.5 || durImpact > 0.3) {
      var details = [];
      if (awakeImpact > 0.5) details.push('awakenings ' + alcAvgAwake.toFixed(1) + ' vs ' + noAlcAvgAwake.toFixed(1));
      if (durImpact > 0.3) details.push('sleep ' + alcAvgDur.toFixed(1) + 'h vs ' + noAlcAvgDur.toFixed(1) + 'h');
      obs.push({ cls: 'bad', icon: 'fa-wine-glass', text: '<b>Alcohol hurts your sleep</b>: ' + details.join(', ') + '. Consider reducing evening alcohol.' });
    } else if (alcAvgLat < noAlcAvgLat - 5 && awakeImpact > 0) {
      obs.push({ cls: 'warn', icon: 'fa-wine-glass', text: 'Alcohol helps you <b>fall asleep faster</b> (' + Math.round(alcAvgLat) + ' vs ' + Math.round(noAlcAvgLat) + ' min) but causes <b>more awakenings</b> (' + alcAvgAwake.toFixed(1) + ' vs ' + noAlcAvgAwake.toFixed(1) + ').' });
    } else {
      obs.push({ cls: 'good', icon: 'fa-wine-glass', text: 'Alcohol doesn\u2019t appear to significantly impact your sleep quality based on current data.' });
    }
  } else if (alcoholDays.length >= 1) {
    obs.push({ cls: 'warn', icon: 'fa-wine-glass', text: 'Alcohol was logged on <b>' + alcoholDays.length + '</b> night(s). Need more data with and without alcohol to analyze its impact.' });
  }

  /* Top awakening cause */
  var topCause = Object.keys(causeCount).sort(function(a, b) { return causeCount[b] - causeCount[a]; })[0];
  if (topCause) {
    var pct = Math.round(causeCount[topCause] / n * 100);
    var tips = { Noise: 'Consider earplugs or white noise.', Light: 'Try blackout curtains or a sleep mask.', Stress: 'Consider journaling or breathing exercises before bed.', Bathroom: 'Reduce fluid intake 2 hours before bed.', Pain: 'Consult with a healthcare provider about pain management.' };
    obs.push({ cls: 'warn', icon: 'fa-triangle-exclamation', text: '<b>' + escHtml(topCause) + '</b> is the top awakening cause (' + pct + '% of nights). ' + (tips[topCause] || '') });
  }

  if (avgAwake > 3) {
    obs.push({ cls: 'bad', icon: 'fa-bell', text: 'Average <b>' + avgAwake.toFixed(1) + ' awakenings</b> per night is high. Fragmented sleep significantly impacts quality.' });
  }

  var html = '';
  obs.forEach(function(o) {
    html += '<div class="observation ' + o.cls + '"><i class="fa-solid ' + o.icon + '"></i> ' + o.text + '</div>';
  });
  document.getElementById('observations').innerHTML = html || '<div class="observation">Not enough data yet for pattern detection.</div>';
}

/* ============ GOOGLE SHEETS DATA PARSING ============ */
/* Google Sheets returns Date objects serialized as ISO strings or fractional numbers.
   These helpers normalize any format back to YYYY-MM-DD / HH:MM strings. */

function parseSheetDate(val) {
  if (!val && val !== 0) return '';
  var s = String(val).trim();
  /* Already YYYY-MM-DD */
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  /* ISO string like "2026-04-12T16:00:00.000Z" */
  if (s.indexOf('T') !== -1) {
    var d = new Date(s);
    if (!isNaN(d.getTime())) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
  }
  /* Numeric serial date (Google Sheets epoch = 1899-12-30) */
  var num = Number(s);
  if (!isNaN(num) && num > 1000) {
    var epoch = new Date(1899, 11, 30);
    epoch.setDate(epoch.getDate() + Math.floor(num));
    return epoch.getFullYear() + '-' + String(epoch.getMonth() + 1).padStart(2, '0') + '-' + String(epoch.getDate()).padStart(2, '0');
  }
  /* Try general Date parse as last resort */
  var d2 = new Date(s);
  if (!isNaN(d2.getTime()) && d2.getFullYear() > 1970) {
    return d2.getFullYear() + '-' + String(d2.getMonth() + 1).padStart(2, '0') + '-' + String(d2.getDate()).padStart(2, '0');
  }
  return s;
}

function parseSheetTime(val) {
  if (!val && val !== 0) return '';
  var s = String(val).trim();
  /* Already HH:MM */
  if (/^\d{1,2}:\d{2}$/.test(s)) return s.length === 4 ? '0' + s : s;
  /* HH:MM:SS */
  if (/^\d{1,2}:\d{2}:\d{2}$/.test(s)) return s.slice(0, 5).padStart(5, '0');
  /* ISO string with T — extract local time */
  if (s.indexOf('T') !== -1) {
    var d = new Date(s);
    if (!isNaN(d.getTime())) {
      return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }
  }
  /* Fractional day (e.g. 0.979166 = 23:30) from Google Sheets time cells */
  var num = Number(s);
  if (!isNaN(num) && num >= 0 && num < 1) {
    var totalMin = Math.round(num * 1440);
    return String(Math.floor(totalMin / 60)).padStart(2, '0') + ':' + String(totalMin % 60).padStart(2, '0');
  }
  /* Date string with time info — try parsing */
  var d2 = new Date(s);
  if (!isNaN(d2.getTime())) {
    return String(d2.getHours()).padStart(2, '0') + ':' + String(d2.getMinutes()).padStart(2, '0');
  }
  return s;
}

/* Flexible row value getter — matches headers regardless of casing/spaces/underscores */
function getRowVal(row, key) {
  if (row[key] !== undefined && row[key] !== null) return row[key];
  var norm = key.toLowerCase().replace(/[_ ]/g, '');
  var keys = Object.keys(row);
  for (var i = 0; i < keys.length; i++) {
    if (keys[i].toLowerCase().replace(/[_ ]/g, '') === norm) return row[keys[i]];
  }
  /* Also try matching by column index as fallback (known column order) */
  return undefined;
}

/* ============ GOOGLE SHEETS ============ */
function startAutoSync() {
  if (syncInterval) clearInterval(syncInterval);
  syncInterval = setInterval(function() { fetchEntries(true); }, 30000);
}

function fetchEntries(silent) {
  setSyncStatus('syncing', 'Syncing...');
  fetch(sheetUrl + '?action=read', { redirect: 'follow' })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      if (data.status === 'success' && Array.isArray(data.data)) {
        entries = data.data.map(function(row) {
          return {
            id: String(getRowVal(row, 'id') || ''),
            date: parseSheetDate(getRowVal(row, 'date')),
            bedTime: parseSheetTime(getRowVal(row, 'bedTime')),
            melatoninTime: parseSheetTime(getRowVal(row, 'melatoninTime')),
            fallAsleepTime: parseSheetTime(getRowVal(row, 'fallAsleepTime')),
            awakeCount: parseInt(getRowVal(row, 'awakeCount')) || 0,
            awakeningTimes: String(getRowVal(row, 'awakeningTimes') || ''),
            wakeUpTime: parseSheetTime(getRowVal(row, 'wakeUpTime')),
            causes: String(getRowVal(row, 'causes') || ''),
            notes: String(getRowVal(row, 'notes') || ''),
            alcohol: String(getRowVal(row, 'alcohol') || ''),
            weight: String(getRowVal(row, 'weight') || '')
          };
        });
        entries.sort(function(a, b) { return b.date.localeCompare(a.date); });
        setSyncStatus('connected', '\u2713 Synced \u2022 ' + entries.length + ' entries \u2022 ' + new Date().toLocaleTimeString());
        if (!silent) showToast('Data loaded (' + entries.length + ' entries)');
      } else {
        throw new Error(data.message || 'Unexpected response');
      }
    })
    .catch(function(err) {
      setSyncStatus('error', '\u2717 Sync failed: ' + err.message + ' \u2022 Tap to retry');
      if (!silent) showToast('Sync failed: ' + err.message);
    });
}

function postToSheet(action, data) {
  setSyncStatus('syncing', 'Saving to Google Sheet...');
  doPostRetry(action, data, 0);
}

function doPostRetry(action, data, retryCount) {
  fetch(sheetUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: action, data: data }),
    redirect: 'follow'
  })
    .then(function(r) {
      if (r.ok || r.type === 'opaque' || r.redirected) {
        return r.text().then(function(text) {
          try { return JSON.parse(text); } catch (e) { return { status: 'success' }; }
        });
      }
      throw new Error('HTTP ' + r.status);
    })
    .then(function(result) {
      if (result.status === 'error') throw new Error(result.message || 'Sheet error');
      setSyncStatus('connected', '\u2713 Saved \u2022 ' + new Date().toLocaleTimeString());
      showToast('\u2713 Saved to Google Sheet!');
      setTimeout(function() { fetchEntries(true); }, 2000);
    })
    .catch(function(err) {
      if (retryCount < 2) {
        setSyncStatus('syncing', 'Retrying save... (attempt ' + (retryCount + 2) + '/3)');
        setTimeout(function() { doPostRetry(action, data, retryCount + 1); }, 1500 * (retryCount + 1));
      } else {
        setSyncStatus('error', '\u2717 Save failed: ' + err.message + ' \u2022 Tap to retry');
        showToast('Save failed after 3 attempts: ' + err.message);
      }
    });
}

function setSyncStatus(state, text) {
  var dot = document.getElementById('syncDot');
  var btn = document.getElementById('syncBtn');
  var bar = document.getElementById('syncBar');
  var barText = document.getElementById('syncText');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
  btn.className = 'sync-btn' + (state === 'syncing' ? ' syncing' : '');
  bar.className = 'sync-bar' + (state === 'connected' ? ' success' : state === 'error' ? ' error' : state === 'syncing' ? ' saving' : '');
  barText.textContent = text || '';
}

/* ============ HELPERS ============ */
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function calcMinutes(start, end) {
  if (!start || !end) return 0;
  var sp = start.split(':').map(Number), ep = end.split(':').map(Number);
  var s = sp[0] * 60 + sp[1], e = ep[0] * 60 + ep[1];
  if (e < s) e += 1440;
  return e - s;
}

function calcDuration(start, end) {
  var m = calcMinutes(start, end);
  return { h: Math.floor(m / 60), m: m % 60 };
}

function timeToDecimal(t) {
  if (!t) return 0;
  var p = t.split(':').map(Number);
  var d = p[0] + p[1] / 60;
  if (d < 12) d += 24;
  return d;
}

function fmtTime(t) {
  if (!t) return '--:--';
  var p = t.split(':');
  var h = parseInt(p[0]), m = p[1];
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + m + ' ' + ampm;
}

function formatDate(d) {
  if (!d) return '';
  var dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function stdDev(arr) {
  if (arr.length < 2) return 0;
  var mean = arr.reduce(function(s, v) { return s + v; }, 0) / arr.length;
  var sq = arr.reduce(function(s, v) { return s + (v - mean) * (v - mean); }, 0);
  return Math.sqrt(sq / arr.length);
}

function escHtml(s) {
  var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function switchTab(panelId) {
  document.querySelectorAll('.bottom-nav button').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === panelId);
  });
  document.querySelectorAll('.panel').forEach(function(p) {
    p.classList.toggle('active', p.id === panelId);
  });
}

/* ============ UI COMPONENTS ============ */
function showToast(msg) {
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2500);
}

function showModal(title, message, onConfirm) {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML =
    '<div class="modal-content">' +
      '<div class="modal-header"><h2>' + title + '</h2>' +
        '<button class="modal-close" id="modalCloseBtn">&times;</button></div>' +
      '<p style="margin-bottom:20px;color:var(--text2);">' + message + '</p>' +
      '<div style="display:flex;gap:8px;">' +
        '<button class="btn btn-outline" id="modalCancelBtn" style="flex:1;">Cancel</button>' +
        '<button class="btn btn-danger" id="modalConfirmBtn" style="flex:1;">Delete</button>' +
      '</div>' +
    '</div>';
  document.getElementById('modalContainer').appendChild(overlay);
  overlay.querySelector('#modalCloseBtn').addEventListener('click', function() { overlay.remove(); });
  overlay.querySelector('#modalCancelBtn').addEventListener('click', function() { overlay.remove(); });
  overlay.querySelector('#modalConfirmBtn').addEventListener('click', function() { overlay.remove(); onConfirm(); });
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
}


</script>
